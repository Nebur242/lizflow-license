name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
          - beta

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    name: Version, tag, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify provenance repository metadata
        run: |
          test "$(node -p "require('./package.json').repository?.url")" = "git+https://github.com/Nebur242/lizflow-license.git"

      - name: Bump package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          npm version "${{ inputs.version }}" --no-git-tag-version

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Git tag ${TAG} already exists" >&2
            exit 1
          fi

          if npm view "@lizflow/license@${VERSION}" version >/dev/null 2>&1; then
            echo "@lizflow/license@${VERSION} is already published" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit version
        id: commit
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): @lizflow/license v${{ steps.version.outputs.version }}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push version commit
        run: git push origin HEAD

      - name: Publish to npm
        run: npm publish --provenance --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@nebur242"

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name="@nebur242/lizflow-license"
          npm publish --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - name: Create GitHub release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --target "${{ steps.commit.outputs.sha }}" \
            --title "@lizflow/license v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
