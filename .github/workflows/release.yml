name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next
          - beta

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Version, tag, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Import GPG signing key
        id: gpg
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_GPG_PRIVATE_KEY}" ]; then
            echo "RELEASE_GPG_PRIVATE_KEY is required for signed release tags" >&2
            exit 1
          fi

          if [ -z "${RELEASE_GPG_PASSPHRASE}" ]; then
            echo "RELEASE_GPG_PASSPHRASE is required for signed release tags" >&2
            exit 1
          fi

          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "${RELEASE_GPG_PRIVATE_KEY}" | gpg --batch --import

          KEY_ID="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^sec/ { print $5; exit }')"
          if [ -z "${KEY_ID}" ]; then
            echo "No GPG secret key was imported" >&2
            exit 1
          fi

          GPG_WRAPPER="${HOME}/.gnupg/gpg-wrapper"
          {
            printf '%s\n' '#!/usr/bin/env bash'
            printf '%s\n' 'exec gpg --batch --pinentry-mode loopback --passphrase "${RELEASE_GPG_PASSPHRASE}" "$@"'
          } > "${GPG_WRAPPER}"
          chmod 700 "${GPG_WRAPPER}"

          git config user.signingkey "${KEY_ID}"
          git config gpg.program "${GPG_WRAPPER}"
          git config tag.gpgSign true

          echo "key_id=${KEY_ID}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify provenance repository metadata
        run: |
          test "$(node -p "require('./package.json').repository?.url")" = "git+https://github.com/Nebur242/lizflow-license.git"

      - name: Bump package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          npm version "${{ inputs.version }}" --no-git-tag-version

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Git tag ${TAG} already exists" >&2
            exit 1
          fi

          if npm view "@lizflow/license@${VERSION}" version >/dev/null 2>&1; then
            echo "@lizflow/license@${VERSION} is already published" >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit version and create tag
        env:
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          git add package.json package-lock.json
          git commit -m "chore(release): @lizflow/license v${{ steps.version.outputs.version }}"
          git tag -s "${{ steps.version.outputs.tag }}" -m "@lizflow/license v${{ steps.version.outputs.version }}"

      - name: Verify signed tag
        env:
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: git tag -v "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        run: npm publish --provenance --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "@lizflow/license v${{ steps.version.outputs.version }}"
          generate_release_notes: true
